name:
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'helm/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go 1.20
        uses: actions/setup-go@v2
        with:
          go-version: 1.20

      - name: build
        run: go build -o go-web-app

      - name: Run tests
        run: |
          go test ./...

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
         working-directory: go-web-app

      - name: Run code quality checks
        run: |
          go fmt ./...
          go vet ./...
        working-directory: go-web-app
  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Action
        uses: docker/build-push-action@v6 |
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:${{github.run_id}}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN}}

      - name: Update Helm chart with new image tag
        run: |
          sed -i 's/tag: .*/tag: "${{github.run_id}}"/' helm/go-web-app/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name 'Gauri160196'
          git config --global user.email 'gaurinarula35@gmail.com'
          git add go-web-app-chart/values.yaml
          git commit -m "Update image tag in Helm chart"
          git push
