apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: go-web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: go-web-app
  template:
    metadata:
      labels:
        app: go-web-app
    spec:
      containers:
      - name: go-web-app
        image: gauri1601/go-web-app:last
        ports:
        - containerPort: 8080
